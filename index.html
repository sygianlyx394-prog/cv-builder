<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Carter - CV</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }

  .container {
    max-width: 800px;
    margin: 50px auto;
    padding: 20px;
  }

  .card {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }

  h1 {
    margin-bottom: 5px;
    color: #38bdf8;
  }

  .title {
    color: #94a3b8;
    margin-bottom: 20px;
  }

  .section {
    margin-top: 20px;
  }

  .section h2 {
    color: #38bdf8;
    font-size: 18px;
    margin-bottom: 8px;
  }

  .box {
    background: #0f172a;
    padding: 10px;
    border-radius: 10px;
    margin-top: 5px;
  }

  .contact {
    margin-top: 20px;
    font-size: 14px;
    color: #94a3b8;
  }

  .badge {
    display: inline-block;
    background: #38bdf8;
    color: black;
    padding: 5px 10px;
    border-radius: 20px;
    margin: 3px;
    font-size: 12px;
  }
</style>

</head>

<body>

<div class="container">
  <div class="card">

    <h1>Daniel Carter</h1>
    <div class="title">Aspiring Web Developer</div>

    <div class="section">
      <h2>About Me</h2>
      <div class="box">
        I am an aspiring web developer passionate about building modern and responsive websites. I am continuously improving my skills in HTML, CSS, and exploring AI tools.
      </div>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div class="box">
        <span class="badge">HTML</span>
        <span class="badge">CSS</span>
        <span class="badge">JavaScript</span>
        <span class="badge">AI Tools</span>
      </div>
    </div>

    <div class="section">
      <h2>Contact</h2>
      <div class="box">
        cvbuilderhub@gmail.com  
      </div>
    </div>

  </div>
</div>

</body>
</html>
